<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2334C759'/%3E%3Ctext x='90' y='125' font-size='100' text-anchor='middle' fill='white'%3E🏃%3C/text%3E%3C/svg%3E">
<title>Fitness Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F2F2F7;--card:#fff;--card2:#F2F2F7;--text:#000;--text2:#3C3C43;--muted:#6C6C70;--sep:rgba(60,60,67,.18);--bdr:rgba(60,60,67,.12);--blue:#007AFF;--green:#34C759;--orange:#FF9500;--red:#FF3B30;--purple:#AF52DE;--indigo:#5856D6;--teal:#30B0C7;--sh:0 1px 4px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.05)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;font-size:15px;line-height:1.47;-webkit-font-smoothing:antialiased}
.app{width:100%;padding-bottom:0}
.pane{display:none;padding:1.1rem 1.75rem 1.5rem}
.pane.on{display:block}

/* Header */
.hdr{padding:.6rem 1rem .5rem;display:flex;justify-content:space-between;align-items:flex-end;position:sticky;top:0;background:rgba(242,242,247,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:10;border-bottom:.5px solid var(--sep)}
.hdr-title{font-size:24px;font-weight:700;letter-spacing:-.02em}
.hdr-sub{font-size:11px;color:var(--muted);text-align:right;line-height:1.5}

/* Cards */
.card{background:var(--card);border-radius:12px;box-shadow:var(--sh);padding:.85rem 1rem;margin-bottom:9px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:9px}
.m{background:var(--card);border-radius:10px;box-shadow:var(--sh);padding:.62rem .78rem}
.ml{font-size:10px;color:var(--muted);letter-spacing:.01em;margin-bottom:2px;font-weight:500}
.mv{font-size:19px;font-weight:600;line-height:1.2;letter-spacing:-.02em}
.ms{font-size:10px;color:var(--muted);margin-top:2px}
.ct{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:.45rem}

/* Progress */
.pb{height:7px;background:rgba(60,60,67,.1);border-radius:4px;overflow:hidden;margin:5px 0 3px}
.pf{height:100%;border-radius:4px;transition:width .5s}

/* Badges */
.bz{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
.cz1{background:rgba(142,142,147,.12);color:#636366}.cz2{background:rgba(52,199,89,.12);color:#248a3d}.cnl{background:rgba(0,122,255,.1);color:#0062cc}.cit{background:rgba(255,149,0,.12);color:#c93400}.cgy{background:rgba(175,82,222,.12);color:#8944ab}.ccy{background:rgba(0,199,190,.12);color:#007d79}.ccn{background:rgba(90,200,250,.15);color:#0070a8}

/* Lists */
.row{display:flex;align-items:center;padding:.42rem 0;border-bottom:.5px solid var(--sep);gap:8px;font-size:13px}
.row:last-child{border:none}
.sec-card{background:var(--card);border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:9px}
.col>:last-child{flex:1;margin-bottom:0}
.sec-card .row{padding:.45rem 1rem}
.sn{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:1.1rem 0 .4rem .05rem}
.ins-row{display:flex;justify-content:space-between;align-items:center;padding:.38rem 0;border-bottom:.5px solid var(--sep);font-size:13px}
.ins-row:last-child{border:none}
.note-txt{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px}
.pr-badge{background:rgba(255,204,0,.15);color:#7d5000;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;display:inline-block}
.up{color:var(--green)}.dn{color:var(--red)}
.ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ic svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ─── Chips & Filter Bar ─── */
.chip{padding:4px 12px;border:none;border-radius:20px;font-size:12px;font-weight:500;background:rgba(118,118,128,.1);cursor:pointer;color:var(--muted);transition:all .15s;font-family:inherit;white-space:nowrap}
.chip:hover:not(.on){background:rgba(118,118,128,.18)}
.chip.on{background:var(--blue);color:#fff;font-weight:600}
.fbar{background:var(--card);border-radius:12px;box-shadow:var(--sh);padding:.6rem 1rem;margin-bottom:12px;display:flex;align-items:center;gap:0;flex-wrap:wrap;row-gap:8px}
.fg{display:flex;align-items:center;gap:6px;padding-right:16px;margin-right:12px;border-right:.5px solid rgba(60,60,67,.1)}
.fg:last-child{border-right:none;padding-right:0;margin-right:0}
.flbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;margin-right:2px}
.fcount{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:500}

/* ─── Desktop Grid Layouts ─── */
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
.dg-wide{display:grid;grid-template-columns:1.2fr 1fr;gap:14px;align-items:stretch}
.dg-wide-rev{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;align-items:stretch}
.col{display:flex;flex-direction:column;gap:0}

/* ─── Stat grids wider on desktop ─── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:9px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:9px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:9px}

.fcount{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500}

/* No bottom nav */
.bnav{display:none!important}

/* Form */
label.fl{display:block;font-size:12px;color:var(--muted);font-weight:500;margin:10px 0 5px}
label.fl:first-child{margin-top:0}
input[type=text],input[type=number],input[type=date],textarea{width:100%;border:.5px solid rgba(60,60,67,.2);border-radius:10px;padding:.52rem .8rem;font-size:15px;background:var(--card);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;box-shadow:0 0 0 .5px rgba(60,60,67,.06)}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
textarea{resize:none;height:66px;font-size:13px}
.cbtn{padding:.42rem .7rem;border:.5px solid rgba(60,60,67,.2);border-radius:8px;font-size:13px;font-weight:500;background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit;box-shadow:0 0 0 .5px rgba(60,60,67,.06);transition:all .12s}
.cbtn.on{border-color:var(--blue);background:rgba(0,122,255,.08);color:var(--blue)}
.sbtn{width:100%;padding:.68rem;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;font-family:inherit;letter-spacing:-.01em;transition:all .12s}
.sbtn:active{opacity:.85;transform:scale(.98)}
.sbtn-g{background:var(--green) !important}
.ttabs{display:flex;background:rgba(118,118,128,.12);border-radius:10px;padding:2px;gap:2px;margin-bottom:1rem}
.tt{flex:1;padding:.38rem;border:none;border-radius:8px;font-size:13px;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:all .12s}
.tt.on{background:var(--card);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1),0 0 0 .5px rgba(0,0,0,.04)}
.gym-btn{padding:.9rem .5rem;border:.5px solid rgba(60,60,67,.18);border-radius:12px;background:var(--card);color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:14px;font-weight:500;font-family:inherit;box-shadow:var(--sh);transition:all .12s}
.gym-btn.on{border-color:var(--purple);background:rgba(175,82,222,.06);color:var(--purple)}
.gym-btn svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.gym-btn .sub{font-size:10px;color:var(--muted);font-weight:400}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.phase-item{display:flex;align-items:center;gap:10px;padding:.5rem 1rem;border-bottom:.5px solid var(--sep)}
.phase-item:last-child{border:none}

/* Toast */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:.48rem 1.1rem;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.cw{position:relative}

/* Modal */
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
#moverlay.open{display:flex}
#msheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:620px;max-height:88vh;overflow-y:auto}
#msheet-inner{padding:0 1rem 1.5rem}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#msheet.open{animation:slideUp .28s cubic-bezier(.32,1.12,.8,1)}
.mhandle{width:36px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:.75rem auto .25rem}
.mfield{margin-bottom:10px}
.mfield label{display:block;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.row-tap{cursor:pointer;transition:background .12s}
.row-tap:active{background:rgba(0,0,0,.04)}

/* Expand/collapse */
.expand-btn{width:100%;padding:.5rem;background:none;border:none;border-top:.5px solid var(--sep);font-size:12px;font-weight:500;color:var(--blue);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px}
.expand-btn:hover{background:rgba(0,122,255,.04)}

/* Heatmap */
.heatmap-grid{display:grid;grid-template-rows:repeat(7,10px);grid-auto-flow:column;gap:2px}

/* ─── Always Desktop Layout ─── */
body{background:#CCCCD4;display:flex;height:100vh;overflow:hidden;align-items:stretch;justify-content:center}
.layout{display:flex;flex:1;max-width:1400px;overflow:hidden;box-shadow:0 0 0 .5px rgba(0,0,0,.1),0 10px 50px rgba(0,0,0,.18)}

/* ─── Mobile Layout ─── */
/* Sidebar collapse */
#sidebar{transition:width .2s ease,min-width .2s ease,opacity .2s ease,padding .2s ease}
#sidebar.sb-hidden{width:0!important;min-width:0!important;overflow:hidden!important;opacity:0!important;padding:0!important;border:none!important}
/* Mac-Version button fixed top-right in mobile mode */
#mac-ver-btn{display:none;position:fixed;top:10px;right:12px;z-index:300;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:.5px solid rgba(60,60,67,.15);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.1);font-family:inherit}
body.mobile #mac-ver-btn{display:flex}
#sb-show-btn{display:none;position:fixed;top:10px;left:12px;z-index:300;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:.5px solid rgba(60,60,67,.15);border-radius:20px;padding:5px 12px;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.1);font-family:inherit}
body.sb-hidden #sb-show-btn{display:flex}
body.sb-hidden #sb-collapse-btn{display:none!important}
body.mobile #sb-collapse-btn{display:none!important}
body.mobile #sb-show-btn{display:none!important}
body.mobile .dg-wide,body.mobile .dg-wide-rev{grid-template-columns:1fr}
/* Bottom tab bar */
.mob-tabbar{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:.5px solid rgba(60,60,67,.15);z-index:400;padding-bottom:env(safe-area-inset-bottom);max-width:1400px;margin:0 auto}
.mob-tabbar{display:flex!important}
body.mobile #sidebar{display:none!important}
.mob-tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:9.5px;font-weight:500;font-family:inherit;padding:.3rem .2rem;transition:color .15s}
.mob-tab-btn.on{color:var(--blue)}
.mob-tab-btn.add{color:var(--green)}
.mob-tab-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.mob-tab-btn.add svg{stroke:var(--green)}
body.mobile .g4{grid-template-columns:1fr 1fr}
body.mobile input,body.mobile select,body.mobile textarea{font-size:16px}
.main-area{display:flex;flex-direction:column;flex:1;overflow-y:auto;height:100vh;background:var(--bg);padding-bottom:70px}
.hdr{display:none}

/* ─── Sidebar ─── */
#sidebar{display:none!important}
.sb-top{padding:1.2rem 1rem .9rem;border-bottom:.5px solid rgba(60,60,67,.1)}
.sb-appname{font-size:15px;font-weight:700;letter-spacing:-.02em}
.sb-nav{padding:.5rem;flex:1;overflow-y:auto}

/* User switcher */
.sb-user{padding:.7rem .8rem .5rem;border-bottom:.5px solid rgba(60,60,67,.1);position:relative;flex-shrink:0}
.sb-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sb-user-btn{display:flex;align-items:center;gap:.5rem;width:100%;background:none;border:none;cursor:pointer;padding:.3rem .4rem;border-radius:8px;font-family:inherit;text-align:left;transition:background .12s}
.sb-user-btn:hover{background:rgba(0,0,0,.06)}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;flex:1}
.sb-user-btn svg{width:12px;height:12px;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round;flex-shrink:0}
.sb-user-menu{position:absolute;top:100%;left:8px;right:8px;background:var(--card);border:.5px solid rgba(60,60,67,.15);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:50;overflow:hidden;display:none}
.sb-user-menu.open{display:block}
.sb-user-opt{width:100%;padding:.45rem .75rem;background:none;border:none;font-size:13px;font-family:inherit;cursor:pointer;text-align:left;color:var(--text);display:flex;align-items:center;gap:.5rem}
.sb-user-opt:hover{background:rgba(0,0,0,.05)}
.sb-user-opt.active{color:var(--blue);font-weight:600}
.sb-user-opt.add{color:var(--blue);font-weight:500;border-top:.5px solid rgba(60,60,67,.08);margin-top:2px}
.sb-user-dot{width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0}
.snav{display:flex;align-items:center;gap:.55rem;width:100%;padding:.5rem .75rem;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-radius:8px;font-family:inherit;text-align:left;transition:all .12s;margin-bottom:2px}
.snav svg{width:16px;height:16px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.snav.on{background:rgba(0,122,255,.12);color:var(--blue);font-weight:600}
.snav:hover:not(.on){background:rgba(0,0,0,.06)}
.sb-bot{padding:.6rem .5rem 1rem;border-top:.5px solid rgba(60,60,67,.1)}
.snav-add{background:var(--blue);color:#fff !important;font-weight:600 !important;justify-content:center;margin-bottom:6px}
.snav-add:hover{opacity:.88}
.snav-sm{font-size:12px;padding:.38rem .75rem;color:var(--muted)}
.snav-divider{height:.5px;background:rgba(60,60,67,.1);margin:.4rem .75rem}
.snav-settings{color:var(--muted);font-size:12px}

/* ─── Print / PDF Report ─── */
#print-report{display:none}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;box-sizing:border-box;margin:0;padding:0}
  body>*{display:none!important}
  #print-report{display:block!important;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#1d1d1f}
  .pr-page{width:210mm;height:297mm;display:flex;flex-direction:column;overflow:hidden;page-break-after:always}
  .pr-page:last-child{page-break-after:avoid}

  /* Header */
  .pr-hdr{background:#1d1d1f;color:#fff;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .pr-hdr-l{display:flex;flex-direction:column;gap:2px}
  .pr-hdr-tag{font-size:8px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.45}
  .pr-hdr-title{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .pr-hdr-r{font-size:9px;opacity:.4;text-align:right;line-height:1.6}

  /* 2x2 grid */
  .pr-4grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;flex:1}
  .pr-q{padding:14px 16px;display:flex;flex-direction:column;gap:6px;border-right:.5px solid #e5e5ea;border-bottom:.5px solid #e5e5ea}
  .pr-q:nth-child(2),.pr-q:nth-child(4){border-right:none}
  .pr-q:nth-child(3),.pr-q:nth-child(4){border-bottom:none}

  /* Section label */
  .pr-qlbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8e8e93;margin-bottom:2px}

  /* Big number */
  .pr-big{font-size:36px;font-weight:700;letter-spacing:-.04em;line-height:1;color:#1d1d1f}
  .pr-big-unit{font-size:16px;font-weight:500;color:#6e6e73}
  .pr-big-sub{font-size:11px;color:#6e6e73;margin-top:1px}

  /* Stat row */
  .pr-row{display:flex;gap:12px;flex-wrap:wrap}
  .pr-kv{display:flex;flex-direction:column;gap:1px}
  .pr-kv-v{font-size:14px;font-weight:700;letter-spacing:-.02em}
  .pr-kv-k{font-size:8px;text-transform:uppercase;letter-spacing:.05em;color:#8e8e93;font-weight:600}

  /* Progress bar */
  .pr-pb{height:4px;background:#e5e5ea;border-radius:2px;overflow:hidden;margin:3px 0}
  .pr-pb-f{height:100%;border-radius:2px}
  .pr-pb-labels{display:flex;justify-content:space-between;font-size:8px;color:#8e8e93}

  /* SVG container */
  .pr-svg{flex-shrink:0}

  /* Split label rows */
  .pr-split-row{display:flex;justify-content:space-between;font-size:9px;padding:1px 0}

  /* Colors */
  .c-g{color:#1c7a3c}.c-r{color:#b80000}.c-b{color:#0062cc}
  .fw7{font-weight:700}

  /* Divider */
  .pr-div{height:.5px;background:#e5e5ea;margin:4px 0}
}
</style>
</head>
<body>
<div class="layout">
  <aside id="sidebar" class="sidebar">

    <div class="sb-user">
      <button class="sb-user-btn" onclick="toggleUserMenu(event)">
        <div class="sb-avatar" id="sb-av">N</div>
        <span class="sb-uname" id="sb-un">Noah</span>
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="sb-user-menu" id="sb-user-menu"></div>
    </div>
    <div class="sb-scroll">
    <div class="sb-top">
      <div class="sb-appname">Fitness Tracking</div>
      <div id="sb-w" style="font-size:22px;font-weight:700;color:var(--green);margin-top:4px;letter-spacing:-.02em"></div>
      <div id="sb-d" style="font-size:11px;color:var(--muted);margin-top:1px"></div>

function buildHeatmap(){
  const weeks=18;
  const labels=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const cells=[];
  for(let w=weeks-1;w>=0;w--){
    for(let d=0;d<7;d++){
      const dt=new Date();
      const dow=dt.getDay()||7;
      dt.setDate(dt.getDate()-((dow-1))+d-w*7);
      const iso=dt.toISOString().slice(0,10);
      const hasRun=R.some(r=>r.date===iso);
      const hasGym=G.some(g=>g.date===iso);
      cells.push({iso,hasRun,hasGym,future:iso>ISO()});
    }
  }
  const color=c=>c.future?'transparent':c.hasRun&&c.hasGym?'#5856D6':c.hasRun?'#34C759':c.hasGym?'#AF52DE':'rgba(0,0,0,.07)';
  return`<div style="display:flex;gap:6px;align-items:flex-start">
    <div style="display:flex;flex-direction:column;gap:2px;margin-right:2px">
      ${labels.map(l=>`<div style="height:10px;font-size:8px;color:var(--muted);line-height:10px;width:14px">${l}</div>`).join('')}
    </div>
    <div class="heatmap-grid" style="grid-template-rows:repeat(7,10px);grid-auto-flow:column;gap:2px;flex:1">
      ${cells.map(c=>`<div style="height:10px;border-radius:2px;background:${color(c)}" title="${c.iso}"></div>`).join('')}
    </div>
  </div>
  <div style="display:flex;gap:10px;margin-top:6px">
    ${[['#34C759','Laufen'],['#AF52DE','Gym'],['#5856D6','Beides'],['rgba(0,0,0,.12)','Pause']].map(([c,l])=>`<span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)"><span style="width:9px;height:9px;border-radius:2px;background:${c};display:inline-block;flex-shrink:0"></span>${l}</span>`).join('')}
  </div>`;
}

  } else if(type==='run'){

    const hr=parseInt(document.getElementById('ehr')?.value||'')||null;
    const cat=document.querySelector('#msheet-inner [data-cat].on')?.dataset.cat||'Normaler Lauf';
    const p=ts.split(':');let dMin=0;
    if(p.length===2)dMin=parseInt(p[0])+(parseInt(p[1])||0)/60;

    if(!dist||!dMin)return alert('Distanz und Zeit prüfen.');
    const i=R.findIndex(x=>x.id===id);if(i>=0){R[i]={...R[i],date,dist,dMin,pace:dMin/dist,hr,cat,note};R.sort((a,b)=>a.date.localeCompare(b.date));saveR();}

let _lastDel=null,_undoTimer=null;
function deleteEntry(type,id){
  let entry=null;
  if(type==='weight'){entry=W.find(x=>x.id===id);W=W.filter(x=>x.id!==id);saveW();}
  else if(type==='run'){entry=R.find(x=>x.id===id);R=R.filter(x=>x.id!==id);saveR();}
  else if(type==='gym'){entry=G.find(x=>x.id===id);G=G.filter(x=>x.id!==id);saveG();}
  _lastDel={type,entry};
  closeModal();rAll();
  const label=type==='weight'?'Gewicht':type==='run'?'Kardio-Eintrag':'Gym-Session';
  const t=document.getElementById('undo-toast');
  const l=document.getElementById('undo-label');
  if(t&&l){l.textContent=label+' gelöscht';t.style.opacity='1';t.style.pointerEvents='all';}
  if(_undoTimer)clearTimeout(_undoTimer);
  _undoTimer=setTimeout(()=>{_lastDel=null;if(t){t.style.opacity='0';t.style.pointerEvents='none';}},5000);
}
function doUndo(){
  if(!_lastDel)return;
  const{type,entry}=_lastDel;
  if(!entry)return;
  if(type==='weight'){W.push(entry);W.sort((a,b)=>a.date.localeCompare(b.date));saveW();}
  else if(type==='run'){R.push(entry);R.sort((a,b)=>a.date.localeCompare(b.date));saveR();}
  else if(type==='gym'){G.push(entry);G.sort((a,b)=>a.date.localeCompare(b.date));saveG();}
  _lastDel=null;clearTimeout(_undoTimer);
  const t=document.getElementById('undo-toast');
  if(t){t.style.opacity='0';t.style.pointerEvents='none';}
  rAll();showToast('↩ Wiederhergestellt');
}

function getActivePhase(S){const today=ISO();return (S.phases||[]).find(p=>p.from<=today&&p.to>=today)||null;}
function effS(S){const ph=getActivePhase(S);if(!ph)return S;const o=Object.assign({},S,{_phase:ph});if(ph.goalWeight)o.goalWeight=ph.goalWeight;if(ph.goalDir)o.goalDir=ph.goalDir;return o;}

// delta color
function dCls(delta,S){
  const ES=effS(S);
  if(delta===0||delta===null||delta===undefined)return '';
  if(ES.goalDir==='maintain') return Math.abs(delta)>0.5?'dn':'';
  return (ES.goalDir==='gain'?delta>0:delta<0)?'up':'dn';
}

// progress toward goal (0-100)
function calcProg(curKg,S){
  const ES=effS(S);
  const start=ES.startWeight,goal=ES.goalWeight;
  if(ES.goalDir==='maintain'){if(!goal)return 100;return Math.max(0,Math.round((1-Math.abs(curKg-goal)/3)*100));}
  if(!start||start===goal)return 0;
  if(ES.goalDir==='gain')return Math.min(100,Math.max(0,Math.round((curKg-start)/(goal-start)*100)));
  return Math.min(100,Math.max(0,Math.round((start-curKg)/(start-goal)*100)));
}

// ═══ Fitness Score (0-100) ════════════════════════════════
function getFitnessScore(S){
  const last4wks=nwks(4);
  const rKmGoal=S.runKmGoal||25;
  const avgRunKm=last4wks.reduce((s,wk)=>s+R.filter(x=>!isCyc(x.cat)&&gw(x.date)===wk).reduce((a,r)=>a+r.dist,0),0)/4; // Z1 zählt zum Volumen
  const cardioScore=Math.min(100,Math.round(avgRunKm/rKmGoal*100));
  const gymGoal=S.gymGoal||4;
  const avgGym=last4wks.reduce((s,wk)=>s+G.filter(x=>gw(x.date)===wk).length,0)/4;
  const gymScore=Math.min(100,Math.round(avgGym/gymGoal*100));
  const since28=new Date();since28.setDate(since28.getDate()-28);
  const s28str=since28.toISOString().slice(0,10);
  const activeDays=new Set([...R,...G].filter(x=>x.date>=s28str).map(x=>x.date)).size;
  const consScore=Math.min(100,Math.round(activeDays/20*100));
  const lW=W[W.length-1];
  const wScore=lW?Math.min(100,Math.max(0,calcProg(lW.weight,S))):0;
  const total=Math.round(cardioScore*0.3+gymScore*0.3+consScore*0.25+wScore*0.15);
  const label=total>=85?'Excellent':total>=70?'Sehr gut':total>=55?'Gut':total>=40?'Okay':'Ausbaufähig';

// Aerobic Efficiency: speed(km/h) / HR * 100
function calcAE(r){if(!r.hr||!r.pace||r.hr<60)return null;return Math.round((60/r.pace)/r.hr*1000)/10;}

// Fitness Score 0-100
function calcFitnessScore(S){
  const tw=TW();
  const runsTW=R.filter(function(x){return gw(x.date)===tw&&!isCyc(x.cat);}).length;
  const gymTW=G.filter(function(x){return gw(x.date)===tw;}).length;
  const runScore=Math.min(40,Math.round(runsTW/Math.max(S.runGoal||3,1)*40));
  const gymScore=Math.min(30,Math.round(gymTW/Math.max(S.gymGoal||4,1)*30));
  const lW=W.length?W[W.length-1]:null;
  const weightScore=lW?Math.round(calcProg(lW.weight,S)/100*20):10;
  const last4=nwks(4);
  const activeWks=last4.filter(function(wk){return R.some(function(x){return gw(x.date)===wk;})||G.some(function(x){return gw(x.date)===wk;});}).length;
  const consScore=Math.round(activeWks/4*10);
  const total=runScore+gymScore+weightScore+consScore;
  return {total,runScore,gymScore,weightScore,consScore,runsTW,gymTW};
}

// Abnahme-Beschleunigung (positive = losing faster, negative = plateau)
function calcRateAccel(){
  if(W.length<8)return null;
  const d4=new Date(Date.now()-28*86400000).toISOString().slice(0,10);
  const d8=new Date(Date.now()-56*86400000).toISOString().slice(0,10);
  const lW=W[W.length-1];
  const w4=W.find(function(x){return x.date>=d4;});
  const w8=W.find(function(x){return x.date>=d8;});
  const w4end=[...W].filter(function(x){return x.date<d4;}).slice(-1)[0];
  if(!w4||!w8||!w4end||!lW)return null;
  const rate4=(w4.weight-lW.weight)/4;
  const rate8=(w8.weight-w4end.weight)/4;
  return Math.round((rate4-rate8)*100)/100;
}

// Next milestones
function calcMilestones(){
  const rOnly=R.filter(function(x){return !isCyc(x.cat);});
  const totalRunKm=Math.round(rOnly.reduce(function(s,x){return s+x.dist;},0));
  const nextKm=[100,150,200,250,300,400,500,750,1000].find(function(m){return m>totalRunKm;});
  const runCount=rOnly.length;
  const nextRun=Math.ceil((runCount+1)/25)*25;
  const gymCount=G.length;
  const nextGym=Math.ceil((gymCount+1)/25)*25;
  const lW=W.length?W[W.length-1]:null;
  const S=getSettings();const ES=effS(S);
  const goal=ES.goalWeight;
  let nextWt=null;
  if(lW&&goal){
    const milestones=ES.goalDir==='lose'?[goal+0.5,goal+1,goal+2,goal+3,goal+5]:
      [goal-0.5,goal-1,goal-2,goal-3,goal-5];
    nextWt=(ES.goalDir==='lose'?milestones.filter(function(m){return m<lW.weight;}):milestones.filter(function(m){return m>lW.weight;}))[0];
  }
  return {nextKm,totalRunKm,kmLeft:nextKm?nextKm-totalRunKm:null,nextRun,runsLeft:nextRun-runCount,nextGym,gymLeft:nextGym-gymCount,nextWt,lW};
}

// Monthly highlights
function calcMonthlyHighlights(){
  const m=ISO().slice(0,7);
  const rM=R.filter(function(x){return x.date.startsWith(m)&&!isCyc(x.cat);});
  const gM=G.filter(function(x){return x.date.startsWith(m);});
  const longestR=rM.length?[...rM].sort(function(a,b){return b.dist-a.dist;})[0]:null;
  const fastestR=rM.filter(function(x){return x.dist>=3;}).length?[...rM].filter(function(x){return x.dist>=3;}).sort(function(a,b){return a.pace-b.pace;})[0]:null;
  const aeRuns=rM.filter(function(r){return r.hr;}).map(function(r){return Object.assign({},r,{ae:calcAE(r)});}).filter(function(x){return x.ae;});
  const bestAE=aeRuns.length?aeRuns.sort(function(a,b){return b.ae-a.ae;})[0]:null;
  const wkSes={};gM.forEach(function(g){const w=gw(g.date);wkSes[w]=(wkSes[w]||0)+1;});
  const bestGymWk=Object.entries(wkSes).sort(function(a,b){return b[1]-a[1];})[0];
  const wkKm={};rM.forEach(function(r){const w=gw(r.date);wkKm[w]=(wkKm[w]||0)+r.dist;});
  const bestRunWk=Object.entries(wkKm).sort(function(a,b){return b[1]-a[1];})[0];
  return {longestR,fastestR,bestAE,bestGymWk,bestRunWk};
}

function _isoWeek(dateStr){
  const d=new Date(dateStr);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w1=new Date(d.getFullYear(),0,4);
  return[d.getFullYear(),1+Math.round(((d-w1)/86400000-3+(w1.getDay()+6)%7)/7)];
}
function _kwRange(yearKw){
  const[y,k]=yearKw.split('-W').map(Number);
  const jan4=new Date(y,0,4);
  const dow=(jan4.getDay()+6)%7;
  const mon=new Date(jan4);mon.setDate(jan4.getDate()-dow+(k-1)*7);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{from:mon.toISOString().slice(0,10),to:sun.toISOString().slice(0,10)};
}

// \u2500\u2500 ExcelJS styled workbook builder \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function _buildStyledWB(label,wData,rData,gData){
  const wb=new ExcelJS.Workbook();
  wb.creator='FitnessTracker';wb.created=new Date();
  const BLUE='FF2E75B6',LBLUE='FFBDD7EE',ALT='FFEBF3FB',WHITE='FFFFFFFF',DARK='FF1F3864';
  const hFill=c=>({type:'pattern',pattern:'solid',fgColor:{argb:c}});
  const hFont=(bold,color,sz)=>({bold:!!bold,color:{argb:color||'FF000000'},size:sz||10,name:'Calibri'});
  const thinBorder={style:'thin',color:{argb:'FFCCCCCC'}};
  const border={top:thinBorder,left:thinBorder,bottom:thinBorder,right:thinBorder};
  function styleHdrRow(row,bg,fg,sz){row.eachCell(c=>{c.fill=hFill(bg);c.font=hFont(true,fg,sz||10);c.border=border;c.alignment={vertical:'middle',horizontal:'center'};});row.height=20;}
  function styleDataRow(row,alt){row.eachCell(c=>{if(alt)c.fill=hFill(ALT);c.border=border;c.alignment={vertical:'middle'};});row.height=18;}
  function titleRow(ws,txt,cols){
    const r=ws.addRow([txt]);ws.mergeCells(r.number,1,r.number,cols);
    r.getCell(1).fill=hFill(BLUE);r.getCell(1).font=hFont(true,WHITE,13);
    r.getCell(1).alignment={vertical:'middle',horizontal:'left',indent:1};r.height=28;
    ws.addRow([]);
  }
  function sectionRow(ws,txt,cols){
    const r=ws.addRow([txt]);ws.mergeCells(r.number,1,r.number,cols);
    r.getCell(1).fill=hFill(LBLUE);r.getCell(1).font=hFont(true,DARK,10);
    r.getCell(1).alignment={vertical:'middle',horizontal:'left',indent:1};r.height=19;
  }
  function pct(v,base){return base?Math.round(v/base*10000)/100+'%':'\u2014';}

  // \u2500\u2500 GEWICHT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  const wsW=wb.addWorksheet('Gewicht');
  wsW.columns=[{width:14},{width:14},{width:14},{width:12},{width:10},{width:30}];
  titleRow(wsW,'GEWICHT \u2014 '+label,6);
  if(wData.length){
    const wAvg=Math.round(wData.reduce((s,x)=>s+x.weight,0)/wData.length*100)/100;
    const wSorted=[...wData].sort((a,b)=>a.weight-b.weight);
    const m=Math.floor(wSorted.length/2);
    const wMed=wSorted.length%2?wSorted[m].weight:Math.round((wSorted[m-1].weight+wSorted[m].weight)*50)/100;
    const wMin=wSorted[0].weight,wMax=wSorted[wSorted.length-1].weight;
    sectionRow(wsW,'ZUSAMMENFASSUNG',6);
    styleHdrRow(wsW.addRow(['\u00d8 Schnitt (kg)','Median (kg)','Min (kg)','Max (kg)','Messungen','']),DARK,WHITE);
    styleDataRow(wsW.addRow([wAvg,wMed,wMin,wMax,wData.length,'']));
    wsW.addRow([]);
    sectionRow(wsW,'ALLE MESSUNGEN',6);
    styleHdrRow(wsW.addRow(['Datum','Gewicht (kg)','\u0394 Vortag (kg)','\u0394 %','Trend','Notiz']),BLUE,WHITE);
    wData.forEach((x,i)=>{
      const prev=wData[i-1];
      const dk=prev?Math.round((x.weight-prev.weight)*100)/100:null;
      const dp=prev&&prev.weight?Math.round(dk/prev.weight*10000)/100:null;
      const trend=dk===null?'\u2014':dk<0?'\u2193':dk>0?'\u2191':'\u2192';
      const row=wsW.addRow([x.date,x.weight,dk??'',dp!=null?dp+'%':'',trend,x.note||'']);
      styleDataRow(row,i%2===1);
      if(dk!==null)row.getCell(3).font={color:{argb:dk<0?'FF34C759':dk>0?'FFFF3B30':'FF8E8E93'},size:10,name:'Calibri'};
    });
  } else {wsW.addRow(['Keine Daten f\u00fcr diesen Zeitraum']);}

  // \u2500\u2500 LAUFEN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  const wsR=wb.addWorksheet('Laufen');
  wsR.columns=[{width:14},{width:13},{width:10},{width:10},{width:16},{width:8},{width:15},{width:26}];
  titleRow(wsR,'LAUFEN \u2014 '+label,8);
  if(rData.length){
    const totalKm=Math.round(rData.reduce((s,x)=>s+x.dist,0)*10)/10;
    const totalMin=rData.reduce((s,x)=>s+x.dMin,0);
    const avgPaceVal=rData.reduce((s,x)=>s+x.pace,0)/rData.length;
    const hrRuns=rData.filter(x=>x.hr);
    const avgHr=hrRuns.length?Math.round(hrRuns.reduce((s,x)=>s+x.hr,0)/hrRuns.length):null;
    const maxDist=Math.max(...rData.map(x=>x.dist));
    const z2=rData.filter(x=>x.cat==='Zone 2');
    sectionRow(wsR,'ZUSAMMENFASSUNG',8);
    styleHdrRow(wsR.addRow(['Gesamt km','Einheiten','\u00d8 Pace','\u00d8 Puls','L\u00e4ngster Lauf','Zone 2 %','Gesamt Zeit','']),DARK,WHITE);
    styleDataRow(wsR.addRow([totalKm,rData.length,ps(avgPaceVal),avgHr?avgHr+' bpm':'\u2014',maxDist.toFixed(1)+' km',rData.length?Math.round(z2.length/rData.length*100)+'%':'\u2014',Math.floor(totalMin/60)+'h '+Math.floor(totalMin%60)+'min','']));
    wsR.addRow([]);
    sectionRow(wsR,'KATEGORIE-AUSWERTUNG',8);
    styleHdrRow(wsR.addRow(['Kategorie','Einheiten','Anteil %','\u00d8 Distanz','\u00d8 Pace','','','']),DARK,WHITE);
    ['Zone 2','Zone 1','Normaler Lauf','Intervall','Rad Zone 2','Rad Normal'].forEach((cat,ci)=>{
      const arr=rData.filter(x=>x.cat===cat);if(!arr.length)return;
      styleDataRow(wsR.addRow([cat,arr.length,pct(arr.length,rData.length),(arr.reduce((s,x)=>s+x.dist,0)/arr.length).toFixed(1)+' km',ps(arr.reduce((s,x)=>s+x.pace,0)/arr.length),'','','']),ci%2===1);
    });
    wsR.addRow([]);
    sectionRow(wsR,'ALLE L\u00c4UFE',8);
    styleHdrRow(wsR.addRow(['Datum','Distanz (km)','Zeit','Pace','\u0394 \u00d8 Pace','Puls','Kategorie','Notiz']),BLUE,WHITE);
    rData.forEach((r,i)=>{
      const dp=Math.round((r.pace-avgPaceVal)*100)/100;
      styleDataRow(wsR.addRow([r.date,r.dist,ds(r.dMin),ps(r.pace),(dp>=0?'+':'')+dp,r.hr||'',r.cat,r.note||'']),i%2===1);
    });
  } else {wsR.addRow(['Keine Daten f\u00fcr diesen Zeitraum']);}

  // \u2500\u2500 GYM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  const wsG=wb.addWorksheet('Gym');
  wsG.columns=[{width:14},{width:20},{width:32}];
  titleRow(wsG,'GYM \u2014 '+label,3);
  if(gData.length){
    const gymT={};gData.forEach(g=>{gymT[g.cat]=(gymT[g.cat]||0)+1;});
    sectionRow(wsG,'SPLIT-AUSWERTUNG',3);
    styleHdrRow(wsG.addRow(['Kategorie','Sessions','Anteil %']),DARK,WHITE);
    Object.entries(gymT).sort((a,b)=>b[1]-a[1]).forEach(([cat,n],i)=>{
      styleDataRow(wsG.addRow([cat,n,pct(n,gData.length)]),i%2===1);
    });
    wsG.addRow([]);
    sectionRow(wsG,'ALLE SESSIONS',3);
    styleHdrRow(wsG.addRow(['Datum','Kategorie','Notiz']),BLUE,WHITE);
    gData.forEach((g,i)=>styleDataRow(wsG.addRow([g.date,g.cat,g.note||'']),i%2===1));
  } else {wsG.addRow(['Keine Daten f\u00fcr diesen Zeitraum']);}

  // \u2500\u2500 KALORIEN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  if(C&&C.length){
    const wsC=wb.addWorksheet('Kalorien');
    wsC.columns=[{width:14},{width:14},{width:14},{width:22}];
    titleRow(wsC,'KALORIEN-PHASEN',4);
    styleHdrRow(wsC.addRow(['Von','Bis','kcal / Tag','Label']),BLUE,WHITE);
    C.forEach((p,i)=>styleDataRow(wsC.addRow([p.from,p.to===NO_END?'offen':p.to,p.kcal,p.label||'']),i%2===1));
  }
  return wb;
}

async function _downloadWB(wb,filename){
  try{
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){console.error(e);showToast('\u26a0\ufe0f Export fehlgeschlagen: '+e.message);}
}

async function exportExcelMonthly(month){
  if(typeof ExcelJS==='undefined'){showToast('\u23f3 ExcelJS l\u00e4dt noch...');return;}
  const mNames={'01':'Januar','02':'Februar','03':'M\u00e4rz','04':'April','05':'Mai','06':'Juni','07':'Juli','08':'August','09':'September','10':'Oktober','11':'November','12':'Dezember'};
  const[yr,mo]=month.split('-');
  const label=mNames[mo]+' '+yr;
  showToast('\u23f3 Erstelle Excel...');
  const wb=await _buildStyledWB(label,W.filter(x=>x.date.startsWith(month)),R.filter(x=>x.date.startsWith(month)),G.filter(x=>x.date.startsWith(month)));
  closeModal();
  await _downloadWB(wb,month+'_'+ACTIVE_USER+'_Fitness.xlsx');
  showToast('\u2713 '+label+' exportiert');
}

async function exportExcelWeekly(yearKw){
  if(typeof ExcelJS==='undefined'){showToast('\u23f3 ExcelJS l\u00e4dt noch...');return;}
  const[y,k]=yearKw.split('-W');
  const{from,to}=_kwRange(yearKw);
  const label='KW '+k+' / '+y+' ('+from+' \u2013 '+to+')';
  const inRange=x=>x.date>=from&&x.date<=to;
  showToast('\u23f3 Erstelle Excel...');
  const wb=await _buildStyledWB(label,W.filter(inRange),R.filter(inRange),G.filter(inRange));
  closeModal();
  await _downloadWB(wb,'KW'+k+'_'+y+'_'+ACTIVE_USER+'_Fitness.xlsx');
  showToast('\u2713 KW '+k+' exportiert');
}

function exportExcel(month){exportExcelMonthly(month);}

function cleanupUserData(){
  const isNoah = ACTIVE_USER === USERS[0];
  const beforeR = R.length, beforeG = G.length, beforeW = W.length;
  if(isNoah){
    // Remove entries whose IDs clearly belong to Lelia (start with 'l' prefix)
    R = R.filter(x => !String(x.id).startsWith('lr') && !String(x.id).startsWith('l_'));
    G = G.filter(x => !String(x.id).startsWith('lg') && !String(x.id).startsWith('l_'));
    W = W.filter(x => !String(x.id).startsWith('lw') && !String(x.id).startsWith('l_'));
  } else {
    // Keep only entries whose IDs clearly belong to Lelia (start with 'l' prefix)
    R = R.filter(x => String(x.id).startsWith('lr') || String(x.id).startsWith('l_'));
    G = G.filter(x => String(x.id).startsWith('lg') || String(x.id).startsWith('l_'));
    W = W.filter(x => String(x.id).startsWith('lw') || String(x.id).startsWith('l_'));
  }
  saveW(); saveR(); saveG();
  const removed = (beforeR-R.length)+(beforeG-G.length)+(beforeW-W.length);
  showToast('✓ '+removed+' falsche Einträge entfernt — jetzt "Alle Daten hochladen"');
  rAll();
}
function exportData(){const blob=new Blob([JSON.stringify({W,R,G,C,user:ACTIVE_USER,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='fitness_backup_'+ISO()+'.json';
  a.click();
  showToast('✓ Backup exportiert');
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.user&&d.user!==ACTIVE_USER){
        if(!confirm('⚠️ Diese Backup-Datei gehört zu "'+d.user+'", aktiver Benutzer ist "'+ACTIVE_USER+'".\n\nTrotzdem importieren?'))return;
      }
      if(d.W)W=d.W;if(d.R)R=d.R;if(d.G)G=d.G;if(d.C)C=d.C;
      saveW();saveR();saveG();saveC();
      rAll();showToast('✓ '+W.length+' Gewicht · '+R.length+' Läufe · '+G.length+' Gym importiert');
    }catch(e){alert('Ungültige Datei — bitte ein gültiges Fitness-Backup wählen.');}
  };
  reader.readAsText(file);
  input.value='';
}

function generateReport(month){
  var yr=month.split('-')[0],mo=month.split('-')[1];
  var mN={'01':'Januar','02':'Februar','03':'März','04':'April','05':'Mai','06':'Juni','07':'Juli','08':'August','09':'September','10':'Oktober','11':'November','12':'Dezember'};
  var mName=mN[mo]||mo;
  var wM=W.filter(function(x){return x.date.startsWith(month);});
  var rM=R.filter(function(x){return x.date.startsWith(month);});
  var gM=G.filter(function(x){return x.date.startsWith(month);});
  // Weight
  var wFirst=wM[0],wLast=wM[wM.length-1];
  var wDelta=wFirst&&wLast?Math.round((wLast.weight-wFirst.weight)*100)/100:null;
  var wStart=W[0]?W[0].weight:88.5;
  var wCur=wLast?wLast.weight:(wFirst?wFirst.weight:wStart);
  var prog=Math.min(100,Math.max(0,(wStart-wCur)/(wStart-75)*100));
  var s28=new Date(ISO());s28.setDate(s28.getDate()-28);
  var w28=W.find(function(x){return x.date>=s28.toISOString().slice(0,10);});
  var lW=W[W.length-1];
  var rate=w28&&lW?(w28.weight-lW.weight)/4:0;
  var weeksLeft=rate>0&&lW?(lW.weight-75)/rate:null;
  var projDate=weeksLeft?new Date(Date.now()+weeksLeft*7*86400000):null;
  var projStr=projDate?projDate.toLocaleDateString('de-DE',{month:'long',year:'numeric'}):null;
  // Runs
  var totalKm=Math.round(rM.reduce(function(s,x){return s+x.dist;},0)*10)/10;
  var totalMin=rM.reduce(function(s,x){return s+x.dMin;},0);
  var avgPace=rM.length?rM.reduce(function(s,x){return s+x.pace;},0)/rM.length:null;
  var z2=rM.filter(function(x){return x.cat==='Zone 2';});
  var bestPaceR=rM.filter(function(x){return x.dist>=3;}).sort(function(a,b){return a.pace-b.pace;})[0];
  var longestR=rM.length?[].concat(rM).sort(function(a,b){return b.dist-a.dist;})[0]:null;
  // Gym
  var gymT={};gM.forEach(function(g){gymT[g.cat]=(gymT[g.cat]||0)+1;});
  var gymTE=Object.entries(gymT).sort(function(a,b){return b[1]-a[1];});
  // All-time
  var allKm=Math.round(R.reduce(function(s,x){return s+x.dist;},0));
  var allWLoss=Math.round((wStart-wCur)*10)/10;
  var today=new Date().toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});

  // SVG helpers
  function sparkline(vals,W,H,color){
    if(vals.length<2)return '';
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||0.1;
    var pts=vals.map(function(v,i){return ((i/(vals.length-1))*(W-4)+2).toFixed(1)+','+(H-2-((v-mn)/rng*(H-6))).toFixed(1);}).join(' ');
    return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+((vals.length-1)/(vals.length-1)*(W-4)+2).toFixed(1)+'" cy="'+(H-2-((vals[vals.length-1]-mn)/rng*(H-6))).toFixed(1)+'" r="2.5" fill="'+color+'"/></svg>';
  }
  function paceScatter(runs,W,H){
    if(runs.length<1)return '';
    var paces=runs.map(function(r){return r.pace;});
    var mn=Math.min.apply(null,paces),mx=Math.max.apply(null,paces),rng=mx-mn||0.1;
    var s='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
    runs.forEach(function(r,i){
      var cx=((i/Math.max(runs.length-1,1))*(W-8)+4).toFixed(1);
      var cy=(H-4-((r.pace-mn)/rng*(H-8))).toFixed(1);
      var col=r.cat==='Zone 2'?'#34C759':r.cat==='Intervall'?'#FF9500':'#007AFF';
      s+='<circle cx="'+cx+'" cy="'+cy+'" r="3.5" fill="'+col+'" opacity="0.8"/>';
    });
    s+='</svg>';
    return s;
  }
  function splitBars(entries,W,H){
    if(!entries.length)return '';
    var mx=entries[0][1];
    var rH=Math.min(14,Math.floor((H-(entries.length-1)*4)/entries.length));
    var cols=['#AF52DE','#FF2D55','#007AFF','#FF9500','#34C759','#5856D6'];
    var s='<svg width="'+W+'" height="'+(entries.length*(rH+4))+'" viewBox="0 0 '+W+' '+(entries.length*(rH+4))+'">';
    entries.forEach(function(e,i){
      var bw=Math.round((e[1]/mx)*(W-28));
      var y=i*(rH+4);
      s+='<rect x="0" y="'+y+'" width="'+bw+'" height="'+rH+'" rx="2" fill="'+cols[i%cols.length]+'" opacity="0.75"/>';
      s+='<text x="'+(bw+4)+'" y="'+(y+rH-2)+'" font-size="8" font-family="-apple-system,sans-serif" fill="#666">'+e[0]+' '+e[1]+'x</text>';
    });
    s+='</svg>';
    return s;
  }
  function kv(k,v,cls){return '<div class="pr-kv"><div class="pr-kv-v'+(cls?' '+cls:'')+'">' +v+'</div><div class="pr-kv-k">'+k+'</div></div>';}

  var html='<div class="pr-page">';
  // Header
  html+='<div class="pr-hdr"><div class="pr-hdr-l"><div class="pr-hdr-tag">Fitness &middot; Monatsbericht</div><div class="pr-hdr-title">'+mName+' '+yr+'</div></div><div class="pr-hdr-r">'+today+'</div></div>';
  html+='<div class="pr-4grid">';

  // ── Q1: GEWICHT ──
  html+='<div class="pr-q">';
  html+='<div class="pr-qlbl">⚖️ Gewicht</div>';
  if(wLast){
    html+='<div style="display:flex;align-items:baseline;gap:5px">';
    html+='<span class="pr-big">'+wLast.weight.toFixed(1)+'</span><span class="pr-big-unit">kg</span>';
    if(wDelta!==null){html+='<span style="font-size:13px;margin-left:6px;font-weight:700" class="'+(wDelta<0?'c-g':'c-r')+'">'+(wDelta>=0?'+':'')+wDelta+' kg</span>';}
    html+='</div>';
    html+='<div class="pr-big-sub">Ø 7d: '+Math.round(wM.slice(-7).reduce(function(s,x){return s+x.weight;},0)/Math.min(wM.length,7)*10)/10+' kg &nbsp;·&nbsp; '+wM.length+' Messungen</div>';
    html+='<div class="pr-div"></div>';
    // Progress bar
    html+='<div style="font-size:9px;font-weight:600;color:#8e8e93;margin-bottom:3px">Ziel 75 kg &nbsp;&middot;&nbsp; <span class="c-g">'+prog.toFixed(2)+'% erreicht</span></div>';
    html+='<div class="pr-pb"><div class="pr-pb-f" style="width:'+prog.toFixed(0)+'%;background:#34C759"></div></div>';
    html+='<div class="pr-pb-labels"><span>88.5</span><span>85</span><span>80</span><span>75 kg</span></div>';
    // Sparkline
    if(wM.length>=3){
      html+='<div class="pr-div"></div>';
      html+=sparkline(wM.map(function(x){return x.weight;}),240,38,'#34C759');
    }
    html+='<div class="pr-div"></div>';
    html+='<div class="pr-row">';
    html+=kv('Rate',rate?(rate.toFixed(2)+' kg/W'):'—');
    html+=kv('Prognose',projStr||'—');
    html+=kv('Gesamt','-'+allWLoss+' kg','c-g');
    html+='</div>';
  } else {html+='<div style="color:#8e8e93;font-size:12px;margin-top:8px">Keine Einträge in diesem Monat</div>';}
  html+='</div>';

  // ── Q2: LAUFEN ──
  html+='<div class="pr-q">';
  html+='<div class="pr-qlbl">🏃 Laufen</div>';
  if(rM.length){
    html+='<div style="display:flex;align-items:baseline;gap:5px">';
    html+='<span class="pr-big c-b">'+totalKm+'</span><span class="pr-big-unit">km</span>';
    html+='</div>';
    html+='<div class="pr-big-sub">'+rM.length+' Läufe &nbsp;·&nbsp; '+Math.floor(totalMin/60)+'h '+Math.floor(totalMin%60)+'min</div>';
    html+='<div class="pr-div"></div>';
    html+='<div class="pr-row">';
    html+=kv('Ø Pace',avgPace?ps(avgPace):'—');
    html+=kv('Zone 2',rM.length?Math.round(z2.length/rM.length*100)+'%':'0%');
    html+=kv('Best Pace',bestPaceR?ps(bestPaceR.pace):'—');
    if(longestR){html+=kv('Längster',longestR.dist.toFixed(1)+' km');}
    html+='</div>';
    html+='<div class="pr-div"></div>';
    html+=paceScatter(rM,240,48);
    html+='<div style="display:flex;gap:10px;margin-top:4px">';
    html+='<span style="font-size:8px;color:#8e8e93;display:flex;align-items:center;gap:2px"><span style="width:7px;height:7px;border-radius:50%;background:#34C759;display:inline-block"></span>Z2</span>';
    html+='<span style="font-size:8px;color:#8e8e93;display:flex;align-items:center;gap:2px"><span style="width:7px;height:7px;border-radius:50%;background:#007AFF;display:inline-block"></span>Normal</span>';
    html+='<span style="font-size:8px;color:#8e8e93;display:flex;align-items:center;gap:2px"><span style="width:7px;height:7px;border-radius:50%;background:#FF9500;display:inline-block"></span>Intervall</span>';
    html+='</div>';
  } else {html+='<div style="color:#8e8e93;font-size:12px;margin-top:8px">Keine Läufe in diesem Monat</div>';}
  html+='</div>';

  // ── Q3: GYM ──
  html+='<div class="pr-q">';
  html+='<div class="pr-qlbl">🏋️ Gym</div>';
  if(gM.length){
    html+='<div style="display:flex;align-items:baseline;gap:5px">';
    html+='<span class="pr-big">'+gM.length+'</span><span class="pr-big-unit">Sessions</span>';
    html+='</div>';
    if(gymTE.length>0){html+='<div class="pr-big-sub">Meist: '+gymTE[0][0]+' ('+gymTE[0][1]+'×)</div>';}
    html+='<div class="pr-div"></div>';
    // Split bars
    html+=splitBars(gymTE,240,gymTE.length*18);
    html+='<div class="pr-div"></div>';
    html+='<div class="pr-row">';
    gymTE.slice(0,3).forEach(function(e){html+=kv(e[0],e[1]+'×');});
    html+='</div>';
  } else {html+='<div style="color:#8e8e93;font-size:12px;margin-top:8px">Keine Sessions in diesem Monat</div>';}
  html+='</div>';

  // ── Q4: GESAMTÜBERSICHT ──
  html+='<div class="pr-q">';
  html+='<div class="pr-qlbl">📊 Gesamtentwicklung</div>';
  // All-time stats
  html+='<div class="pr-row" style="flex-wrap:wrap;gap:10px">';
  html+=kv('Abgenommen seit Dez 25',allWLoss+' kg','c-g fw7');
  html+=kv('Gelaufen gesamt',allKm+' km');
  html+=kv('Gym-Sessions',G.length+'×');
  html+=kv('Läufe gesamt',R.length+'×');
  html+='</div>';
  html+='<div class="pr-div"></div>';
  // Monthly trend bars: last 4 months km
  var last4M=[];

  }

    const med=Math.round((medArr.length%2?medArr[mid].weight:(medArr[mid-1].weight+medArr[mid].weight)/2)*10)/10;

    const prevAvg=prevE.length?Math.round(prevE.reduce((s,x)=>s+x.weight,0)/prevE.length*10)/10:null;
    const d=prevAvg!==null?Math.round((avg-prevAvg)*10)/10:null;

    const dkgMed=prevMed!==null?Math.round((med-prevMed)*100)/100:null;

    return{wk,avg,med,dkgAvg,dpctAvg,dkgMed,dpctMed,count:vals.length};
  }).reverse();
  // Rolling for chart
  const rolling=W.map((pt,i)=>{const sl=W.slice(Math.max(0,i-6),i+1);return Math.round(sl.reduce((s,p)=>s+p.weight,0)/sl.length*10)/10;});
  const kcalData=W.map(x=>calForDate(x.date));

    </div></div>
    <div style="margin-left:auto;font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap">${gym.length} Sessions</div>
  </div>

  <div class="dg-wide" style="gap:16px">

      <div class="g4" style="margin-bottom:10px">
        <div class="m"><div class="ml">Gesamt</div><div class="mv">${total}</div><div class="ms">Sessions</div></div>

        <div class="m"><div class="ml">Ø/Woche</div><div class="mv">${avgWk}</div><div class="ms">Durchschnitt</div></div>
        <div class="m"><div class="ml">Aktive Wo.</div><div class="mv">${activeWks}</div><div class="ms">von ${wksEl}</div></div>
      </div>
      <div class="card" style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px">Insights</div>
        <div class="ins-row"><span>Aktuelle Streak</span><span style="font-weight:700">${streak} Woche${streak!==1?'n':''} in Folge</span></div>
        <div class="ins-row"><span>Beste Streak</span><span style="font-weight:700">${best} Wochen</span></div>
        <div class="ins-row"><span>Meisttrainiert</span><span style="font-weight:700">${tE[0]?tE[0][0]:'-'} <span style="font-size:10px;font-weight:400;color:var(--muted)">${tE[0]?tE[0][1]+'×':''}</span></span></div>

      ${(()=>{const Sgg=getSettings();const gg=Sgg.gymGoal||4;const gtw=G.filter(x=>gw(x.date)===TW()).length;const dot=(n,max,c)=>Array.from({length:max},(_,i)=>'<span style="width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px;background:'+(i<n?c:'rgba(0,0,0,.1)')+'"></span>').join('');return '<div class="card" style="padding:.65rem 1rem"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Wochenziel Gym</span><span style="font-size:12px;color:var(--muted)">'+gtw+'/'+gg+'</span></div><div>'+dot(gtw,gg,'#AF52DE')+'</div></div>';})()}
      <div class="card">
        <div class="ins-row"><span>Zeit geschätzt</span><span style="font-weight:700">${(G.length*1.25).toFixed(0)} h <span style="font-size:10px;font-weight:400;color:var(--muted)">à 75 min</span></span></div>

        <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px">Split-Breakdown</div>

          <span style="font-size:11px;color:var(--muted);margin-right:4px">${relDate(g.date)}</span>
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;flex-shrink:0;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round"><path d="M9 18l6-6-6-6"/></svg>

}

function doLog(){
  const date=document.getElementById('ld')?.value||ISO();
  const note=document.getElementById('ln')?.value?.trim()||'';
  if(curLT==='weight'){
    const kg=parseFloat(document.getElementById('lw')?.value||'');
    if(!kg||kg<40||kg>300)return alert('Bitte gültiges Gewicht eingeben.');
    addWeight({date,weight:kg,note});showToast('✓ Gewicht eingetragen');rAll();nav('wt');
  } else if(curLT==='run'){
    const dist=parseFloat(document.getElementById('ldist')?.value||'');
    const ts=document.getElementById('ltime')?.value||'';
    if(!dist)return alert('Distanz eingeben.');
    const p=ts.split(':');let dMin=0;
    if(p.length===2)dMin=parseInt(p[0])+(parseInt(p[1])||0)/60;
    else if(p.length===3)dMin=parseInt(p[0])*60+(parseInt(p[1])||0)+(parseInt(p[2])||0)/60;
    if(!dMin)return alert('Zeit im Format MM:SS eingeben.');
    const hr=parseInt(document.getElementById('lhr')?.value||'')||null;
    addRun({date,dist,dMin,pace:dMin/dist,hr,cat:catSel,note});showToast('✓ Lauf eingetragen');rAll();nav('run');
  } else if(curLT==='gym'){
    addGym({date,cat:gymSel,note});showToast('✓ Gym eingetragen');rAll();nav('gym');
  } else {

    const to=document.getElementById('calT')?.value;
    const kcal=parseInt(document.getElementById('calK')?.value||'');
    const label=document.getElementById('calL')?.value?.trim()||'';

  }
}

function getFBConfig(){try{return JSON.parse(localStorage.getItem('nf4:fbConfig')||'null');}catch(e){return null;}}

function setSyncDot(status){
  _syncStatus=status;

  if(dot)dot.style.background=colors[status]||'#8E8E93';
  if(label)label.textContent=labels[status]||'';
  if(ts){
    if(status==='ready'){ts.textContent=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
    else if(status==='syncing'){ts.textContent='';}
    else if(status==='error'){ts.textContent='';}

  }
  if(btn){
    if(status==='syncing'){btn.textContent='⏳ Wird hochgeladen…';btn.disabled=true;btn.style.opacity='0.6';}
    else if(status==='ready'){btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round"><polyline points="20 6 9 17 4 12"/></svg> Hochgeladen ✓';btn.disabled=false;btn.style.opacity='1';btn.style.background='#34C759';setTimeout(()=>{btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="14"/></svg> Jetzt hochladen';btn.style.background='var(--blue)';},2500);}
    else{btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="14"/></svg> Jetzt hochladen';btn.disabled=false;btn.style.opacity='1';btn.style.background='var(--blue)';}
  }
}
async function _manualSync(){
  if(!_db){showToast('⚠️ Keine Cloud-Verbindung');return;}
  setSyncDot('syncing');
  await pushAllUsersToCloud();
}

function fbSync(){
  if(!_fbReady||!_db)return;
  if(_syncTimer)clearTimeout(_syncTimer);
  setSyncDot('syncing');
  _syncTimer=setTimeout(()=>pushAllUsersToCloud(),1500);
}

async function pushToCloud(user){
  if(!_db)return;
  try{
    saveLocalBackup(user);
    const ts=new Date().toISOString();
    _lastPushTs=ts;
    const payload={
      W:JSON.stringify(W),R:JSON.stringify(R),G:JSON.stringify(G),
      C:JSON.stringify(C),
      settings:localStorage.getItem('nf4:settings:'+user)||'{}',
      users:localStorage.getItem('nf4:users')||'["Noah"]',
      ts:ts,v:2
    };
    await _db.collection('fitnessTracker').doc(user).set(payload);
    // Write app version so other devices can detect updates
    await _db.collection('fitnessTracker').doc('appMeta').set({version:APP_VERSION,updatedAt:ts},{merge:true});
  }catch(e){console.error('Sync error:',e);setSyncDot('error');throw e;}
}

async function pushAllUsersToCloud(){
  if(!_db)return;
  // Only push the active user — never overwrite another user's cloud data from stale local cache
  try{
    await pushToCloud(ACTIVE_USER);
    setSyncDot('ready');
    showToast('☁️ Gesichert · '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){console.error('Sync error:',e);setSyncDot('error');showToast('⚠️ Sync fehlgeschlagen');}
}

async function pullFromCloud(user){
  if(!_db)return false;
  try{
    const doc=await _db.collection('fitnessTracker').doc(user).get();
    if(!doc.exists)return false;
    const d=doc.data();
    // Only accept cloud data if it's newer than local data
    const localTs=localStorage.getItem('nf4:localTs:'+user);
    if(localTs&&d.ts&&d.ts<=localTs){setSyncDot('ready');return true;}
    if(_lastPushTs&&d.ts&&d.ts<=_lastPushTs){setSyncDot('ready');return true;}
    const cW=d.W?JSON.parse(d.W):[];const cR=d.R?JSON.parse(d.R):[];
    const cG=d.G?JSON.parse(d.G):[];const cC=d.C?JSON.parse(d.C):[];
    // Merge by ID: keep local entries not in cloud, cloud wins on conflicts
    const mergeById=(local,cloud)=>{const m={};local.forEach(e=>m[e.id]=e);cloud.forEach(e=>m[e.id]=e);return Object.values(m).sort((a,b)=>a.date.localeCompare(b.date));};
    if(cW.length>0)W=mergeById(W,cW);
    if(cR.length>0)R=mergeById(R,cR);
    if(cG.length>0)G=mergeById(G,cG);
    if(cC.length>0)C=cC;
    if(d.settings)localStorage.setItem('nf4:settings:'+user,d.settings);
    if(d.users){
      var pu=JSON.parse(d.users);
      var newUsers=false;
      pu.forEach(function(u){if(!USERS.includes(u)){USERS.push(u);newUsers=true;}});
      localStorage.setItem('nf4:users',JSON.stringify(USERS));
      if(newUsers)setTimeout(function(){location.reload();},500);
    }
    // Save to localStorage without triggering fbSync (avoid push-after-pull loop)
    try{localStorage.setItem(uk('nf4:fw'),JSON.stringify(W));}catch(e){}
    try{localStorage.setItem(uk('nf4:fr'),JSON.stringify(R));}catch(e){}
    try{localStorage.setItem(uk('nf4:fg'),JSON.stringify(G));}catch(e){}
    try{localStorage.setItem(uk('nf4:c'),JSON.stringify(C));}catch(e){}
    setSyncDot('ready');
    return true;
  }catch(e){setSyncDot('error');return false;}
}

function loadFirebaseSDK(cb){
  if(window.firebase&&window.firebase.firestore){cb();return;}
  const load=src=>new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  const V='9.23.0';
  Promise.all([
    load(`https://www.gstatic.com/firebasejs/${V}/firebase-app-compat.js`),
    load(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore-compat.js`)
  ]).then(cb).catch(e=>{console.error('SDK load fail',e);setSyncDot('error');});
}

function doConnectFirebase(){const keys=['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];const base=getFBConfig()||_DEFAULT_FB_CFG;const cfg={};keys.forEach(k=>{const el=document.getElementById('fb_'+k);cfg[k]=(el&&el.value.trim())||base[k]||'';});if(!cfg.apiKey)return showToast('⚠️ Config fehlt');saveFBConfig(cfg);closeModal();showToast('🔄 Verbinde...');if(window.firebase&&firebase.apps.length){try{firebase.apps[0].delete();}catch(e){}} _db=null;_fbReady=false;setTimeout(initFirebase,300);}

// Auto-start Firebase on page load
setTimeout(initFirebase,500);

// Auto-pull when app becomes visible again (phone unlocked, tab switched back)
var _lastPullTime=0;
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&_fbReady&&_db){
    var now=Date.now();
    if(now-_lastPullTime>30000){ // max once per 30 seconds
      _lastPullTime=now;
      // Don't pull if a push is still pending — local changes would be overwritten
      if(_syncTimer)return;
      pullFromCloud(ACTIVE_USER).then(function(loaded){
        if(loaded){rAll();setSyncDot('ready');}
      });
    }
  }
});

// Push immediately when page is closed/hidden — don't lose data to debounce timer
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden'&&_fbReady&&_db&&_syncTimer){
    clearTimeout(_syncTimer);_syncTimer=null;
    pushToCloud(ACTIVE_USER);
  }
});
window.addEventListener('beforeunload',function(){
  if(_fbReady&&_db&&_syncTimer){
    clearTimeout(_syncTimer);_syncTimer=null;
    pushToCloud(ACTIVE_USER);
  }
});

var _lastPushTs='';
var _realtimeUnsub=null;

function setupRealtimeSync(user){
  // No realtime listener - push/pull only to prevent data mixing
  if(_realtimeUnsub){_realtimeUnsub();_realtimeUnsub=null;}
}
function doDisconnectFirebase(){localStorage.removeItem('nf4:fbConfig');_db=null;_fbReady=false;setSyncDot('off');closeModal();showToast('Cloud-Verbindung getrennt');}
function _doUpload(){pushToCloud(ACTIVE_USER).then(function(){showToast('✅ Hochgeladen');});}
function _doSyncAll(){showToast('🔄 Synchronisiere...');pushAllUsersToCloud().then(function(){showToast('✅ Alle Benutzer synchronisiert');});}
async function _doUploadAll(){
  // Only push active user — never overwrite other users' cloud data from stale local cache
  showToast('🔄 Lade hoch...');
  await pushAllUsersToCloud();
}
function _doParsePaste(){var el=document.getElementById('cfg-paste-area');parsePastedConfig(el?el.value:'');}
function parsePastedConfig(text){var keys=['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];var cfg={};keys.forEach(function(k){var m=text.match(new RegExp(k+'\\s*:\\s*["\']([^"\']+)["\']'));if(m)cfg[k]=m[1];});if(Object.keys(cfg).length>=4){keys.forEach(function(k){var el=document.getElementById('fb_'+k);if(el&&cfg[k])el.value=cfg[k];});showToast('✓ Config erkannt');}else showToast('⚠️ Config nicht erkannt');}
function showQR(){var cfg=getFBConfig()||_DEFAULT_FB_CFG;var area=document.getElementById('qr-area');var qrDiv=document.getElementById('qr-code');if(!area||!qrDiv)return;qrDiv.innerHTML='';area.style.display='block';var load=function(){try{new QRCode(qrDiv,{text:JSON.stringify(cfg),width:240,height:240,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.L});}catch(e){}};if(window.QRCode){load();}else{var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';s.onload=load;document.head.appendChild(s);}}
function updateMobNav(){['ub','wt','run','gym','log'].forEach(function(t){var b=document.getElementById('mnt-'+t);if(b)b.classList.toggle('on',t===curTab);var b2=document.getElementById('mbt-'+t);if(b2)b2.classList.toggle('on',t===curTab);});}
function saveLocalBackup(user){
  try{
    var key='nf4:backup:'+user;
    var backups=JSON.parse(localStorage.getItem(key)||'[]');
    backups.unshift({ts:new Date().toISOString(),W:JSON.parse(JSON.stringify(W)),R:JSON.parse(JSON.stringify(R)),G:JSON.parse(JSON.stringify(G)),C:JSON.parse(JSON.stringify(C))});
    if(backups.length>5)backups=backups.slice(0,5);
    localStorage.setItem(key,JSON.stringify(backups));
  }catch(e){}
}
function getLocalBackups(user){
  try{return JSON.parse(localStorage.getItem('nf4:backup:'+user)||'[]');}catch(e){return[];}
}
function openBackupRestoreModal(){
  var backups=getLocalBackups(ACTIVE_USER);
  var c=document.getElementById('msheet-inner');
  document.getElementById('moverlay').classList.add('open');
  document.getElementById('msheet').classList.add('open');
  if(!backups.length){
    c.innerHTML='<div style="font-size:17px;font-weight:700;margin-bottom:12px">🔄 Backup wiederherstellen</div><div style="color:var(--muted);font-size:14px">Noch keine Backups vorhanden.</div><button onclick="closeModal()" style="width:100%;padding:.5rem;background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:16px">Schließen</button>';
    return;
  }
  var btns=backups.map(function(b,i){
    var d=new Date(b.ts);
    var label=d.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    return '<button onclick="restoreBackup('+i+')" style="width:100%;padding:.65rem .8rem;text-align:left;background:var(--card);border:.5px solid var(--sep);border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:6px">'
      +'<div style="font-weight:600">'+label+'</div>'
      +'<div style="color:var(--muted);font-size:11px">'+b.W.length+' Gewichte · '+b.R.length+' Läufe · '+b.G.length+' Gym</div>'
      +'</button>';
  }).join('');
  c.innerHTML='<div style="font-size:17px;font-weight:700;margin-bottom:12px">🔄 Backup wiederherstellen</div>'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Letzte 5 automatische Backups:</div>'
    +btns
    +'<button onclick="closeModal()" style="width:100%;padding:.5rem;background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:8px">Abbrechen</button>';
}
function restoreBackup(idx){
  var backups=getLocalBackups(ACTIVE_USER);
  var b=backups[idx];
  if(!b)return;
  W=b.W;R=b.R;G=b.G;C=b.C||C;
  saveW();saveR();saveG();saveC();
  closeModal();rAll();
  showToast('✅ Backup von '+new Date(b.ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+' wiederhergestellt');
}
function setMobile(on){localStorage.setItem('nf4:mobileView',on?'1':'0');location.reload();}
function _mobileSyncCard(){
  const colors={off:'#8E8E93',ready:'#34C759',syncing:'#FF9500',error:'#FF3B30'};
  const labels={off:'Nicht verbunden',ready:'Gesichert',syncing:'Lädt hoch…',error:'Sync-Fehler'};
  const dot=`<span style="width:8px;height:8px;border-radius:50%;background:${colors[_syncStatus]||'#8E8E93'};display:inline-block;flex-shrink:0"></span>`;
  const ts=document.getElementById('sync-ts');
  const tsText=ts?ts.textContent:'';
  const versionBar=_appOutdated
    ?`<div style="padding:7px 10px;font-size:12px;font-weight:600;color:#FF9500;background:#FF950015;border-top:.5px solid #FF950030">⚠️ Neue Version — <button onclick="location.reload()" style="background:none;border:none;color:#FF9500;font-weight:700;text-decoration:underline;cursor:pointer;font-family:inherit;font-size:12px;padding:0">Neu laden</button> vor dem Eintragen</div>`
    :(_syncStatus==='ready'?`<div style="padding:7px 10px;font-size:12px;font-weight:600;color:#34C759;background:#34C75910;border-top:.5px solid #34C75930">✓ Neueste Version — du kannst eintragen</div>`:'');
  const btnLabel=_appOutdated?'🔄 Neu laden':'⬆ Jetzt hochladen';
  const btnAction=_appOutdated?'location.reload()':'closeModal();_manualSync()';
  const btnBg=_appOutdated?'#FF9500':'var(--blue)';
  return `<div style="border:.5px solid var(--sep);border-radius:12px;overflow:hidden;margin-bottom:6px">
    <div style="padding:9px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--card)">
      <span style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600">${dot} ${labels[_syncStatus]||'—'}</span>
      <span style="font-size:11px;color:var(--muted)">${tsText}</span>
    </div>
    ${versionBar}
    <button onclick="${btnAction}" style="width:100%;padding:9px;background:${btnBg};color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">${btnLabel}</button>
  </div>`;
}
var _appOutdated=false;
function openMobileMenu(){
  var c=document.getElementById('msheet-inner');
  document.getElementById('moverlay').classList.add('open');
  document.getElementById('msheet').classList.add('open');
  var userBtns=USERS.map(function(u){
    var isActive=u===ACTIVE_USER;
    var bg=isActive?'rgba(0,122,255,.08)':'var(--card)';
    var border=isActive?'.5px solid rgba(0,122,255,.3)':'.5px solid var(--sep)';
    var fw=isActive?'700':'400';
    var col=isActive?'var(--blue)':'var(--text)';
    return '<button data-user="'+u+'" onclick="switchUser(this.dataset.user);closeModal()" style="width:100%;padding:.65rem .8rem;text-align:left;background:'+bg+';border:'+border+';border-radius:12px;font-size:15px;font-weight:'+fw+';cursor:pointer;font-family:inherit;margin-bottom:6px;color:'+col+'"><span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--blue);color:white;font-size:12px;font-weight:700;text-align:center;line-height:28px;margin-right:8px">'+u[0].toUpperCase()+'</span>'+u+'</button>';
  }).join('');
  c.innerHTML='<div style="font-size:17px;font-weight:700;margin-bottom:12px">👤 Benutzer</div>'
    +userBtns
    +'<div style="height:.5px;background:var(--sep);margin:.4rem 0 .8rem"></div>'
    +'<button onclick="closeModal();openSettingsModal()" style="width:100%;padding:.6rem;text-align:left;background:var(--card);border:.5px solid var(--sep);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:6px">⚙️ Profil & Ziele</button>'
    +_mobileSyncCard()
    +'<button onclick="closeModal();openExcelModal()" style="width:100%;padding:.6rem;text-align:left;background:var(--card);border:.5px solid var(--sep);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:6px">📊 Excel Export</button>'
    +'<button onclick="closeModal();exportData()" style="width:100%;padding:.6rem;text-align:left;background:var(--card);border:.5px solid var(--sep);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:6px">💾 JSON Backup</button>'
    +'<label style="display:block;width:100%;padding:.6rem;text-align:left;background:var(--card);border:.5px solid var(--sep);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:6px;box-sizing:border-box">📥 Importieren<input type="file" accept=".json" style="display:none" onchange="importData(this);closeModal()"></label>'
    +'<div style="display:flex;gap:6px;margin-bottom:12px">'
    +'<button onclick="closeModal();setMobile(false)" style="flex:1;padding:.6rem;background:'+(localStorage.getItem('nf4:mobileView')!=='1'?'var(--blue)':'var(--card)')+';color:'+(localStorage.getItem('nf4:mobileView')!=='1'?'white':'var(--muted)')+';border:'+(localStorage.getItem('nf4:mobileView')!=='1'?'none':'.5px solid var(--sep)')+';border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">🖥 Mac</button>'
    +'<button onclick="closeModal();setMobile(true)" style="flex:1;padding:.6rem;background:'+(localStorage.getItem('nf4:mobileView')==='1'?'var(--blue)':'var(--card)')+';color:'+(localStorage.getItem('nf4:mobileView')==='1'?'white':'var(--muted)')+';border:'+(localStorage.getItem('nf4:mobileView')==='1'?'none':'.5px solid var(--sep)')+';border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">📱 Mobil</button>'
    +'</div>'
    +'<button onclick="closeModal();openBackupRestoreModal()" style="width:100%;padding:.6rem;text-align:left;background:#fff3cd;border:.5px solid #ffc107;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:6px">🔄 Backup wiederherstellen</button>'
    +'<button onclick="closeModal()" style="width:100%;padding:.5rem;background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer;font-family:inherit">Schließen</button>';
}
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  if(!sb)return;
  const hidden=sb.classList.toggle('sb-hidden');
  document.body.classList.toggle('sb-hidden',hidden);
  localStorage.setItem('nf4:sbHidden',hidden?'1':'0');
  const showBtn=document.getElementById('sb-show-btn');
  if(showBtn)showBtn.style.display=hidden?'flex':'none';
  const colBtn=document.getElementById('sb-collapse-btn');
  if(colBtn)colBtn.style.display=hidden?'none':'block';
}
window.addEventListener('DOMContentLoaded',function(){
  var saved=localStorage.getItem('nf4:mobileView');
  var isMob=saved==='1';
  var btnM=document.getElementById('btn-mobile-ver');
  var btnD=document.getElementById('btn-mac-ver');
  if(btnM)btnM.style.display=isMob?'none':'';
  if(btnD)btnD.style.display=isMob?'':'none';
  if(isMob)document.body.classList.add('mobile');
  // Always show user button
  var mub=document.getElementById('mob-user-btn');
  if(mub){mub.style.display='flex';mub.textContent=(typeof ACTIVE_USER!=='undefined'?ACTIVE_USER[0].toUpperCase():'N');}
  // On mobile: auto-hide sidebar unless user explicitly showed it
  var sbSaved=localStorage.getItem('nf4:sbHidden');
  var sbHide=isMob?(sbSaved!=='0'):sbSaved==='1';
  if(sbHide){
    var sb=document.getElementById('sidebar');
    if(sb)sb.classList.add('sb-hidden');
    document.body.classList.add('sb-hidden');
    var showBtn=document.getElementById('sb-show-btn');
    if(showBtn)showBtn.style.display='flex';
    var colBtn=document.getElementById('sb-collapse-btn');
    if(colBtn)colBtn.style.display='none';
  }
  updateMobNav();
});
</script>
</body>
</html>
